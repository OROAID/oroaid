<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OROAID Admin</title>

  <!-- Netlify Identity -->
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS (use a stable pinned version) -->
  <script defer src="https://unpkg.com/decap-cms@3.1.12/dist/decap-cms.js"></script>

  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    .hint { max-width: 720px; color: #2b2b2b; }
    code { background: #f2f2f2; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>OROAID Admin</h1>
  <p class="hint">
    If you can read this but no login appears, the CMS script is blocked or not loading.
    Try a hard refresh: <code>Ctrl + F5</code>.
  </p>

  <noscript>
    <p><strong>JavaScript is disabled.</strong> Please enable JavaScript to use the admin panel.</p>
  </noscript>
</body>
</html>
